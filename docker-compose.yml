  services:
    # Serviço 1: A aplicação construída a partir de um Dockerfile local
    dbt:
      volumes: 
        - ./projeto_py_sql_dbt:/Olist
      build:
        context: .
        dockerfile: Dockerfile
      ports:
        - "8080:8080"
      environment:
        - DATABASE_URL=${DATABASE_URL}
        - DBT_PROFILES_DIR=${DBT_PROFILES_DIR}
      depends_on:
        db:
          condition: service_healthy

    # Serviço 2: O serviço de banco de dados usando uma imagem pré-construída
    db:
      image: postgres:16-alpine
      restart: always
      environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
      ports:
        - "5435:5432"
      volumes:
        - db_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
        interval: 5s
        timeout: 5s
        retries: 5

  volumes:
    db_data: