version: 2

models:
  - name: stg_orders
    description: "Tabela de ordens de compra com informações dos pedidos"
    columns:
      - name: ord_id
        tests:
          - unique
          - not_null
      - name: cust_id
        tests:
          - not_null
      - name: ord_status
        tests:
          - not_null
      - name: ord_purchase_ts
        tests:
          - not_null 
      - name: ord_est_deliv_dt
        tests:
          - not_null
  - name: stg_order_items
    description: "Tabela de itens de ordens de compra com informações de items das ordens de compras"
    columns:
      - name: ord_id
        tests:
          - not_null
      - name: ord_item_id
        tests:
          - not_null
      - name: prod_id
        tests:
          - not_null
      - name: sell_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null
      - name: freight_value
        tests:
          - not_null
  - name: stg_order_payments
    description: "Tabela de pagamentos de ordens de compra"
    columns:
      - name: ord_id
        tests:
          - not_null
      - name: pay_seq
        tests:
          - not_null
      - name: pay_type
        tests:
          - not_null
      - name: pay_installments
        tests:
          - not_null
      - name: pay_value
        tests:
          - not_null
  - name: stg_order_reviews
    description: "Tabela de avaliações de pedidos com informações de reviews dos pedidos"
    columns:
      - name: rev_id
        tests:
          - not_null
      - name: ord_id
        tests:
          - not_null
      - name: rev_score
        tests:
          - not_null
      - name: rev_creation_date
        tests:
          - not_null
  - name: stg_customers
    description: "Tabela de clientes com informações dos clientes"
    columns:
      - name: cust_id
        tests:
          - unique
          - not_null
      - name: cust_zip_code_prefix
        tests:
          - not_null
      - name: cust_city
        tests:
          - not_null
      - name: cust_state
        tests:
          - not_null
  - name: stg_geolocation
    description: "Tabela de geolocalização com informações de localização"
    columns:
      - name: geo_zip_code_prefix
        tests:
          - not_null
      - name: geo_lat
        tests:
          - not_null
      - name: geo_lng
        tests:
          - not_null
      - name: geo_city
        tests:
          - not_null
      - name: geo_state
        tests:
          - not_null
  - name: stg_sellers
    description: "Tabela de vendedores com informações dos vendedores"
    columns:
      - name: sell_id
        tests:
          - unique
          - not_null
      - name: sell_zip_code_prefix
        tests:
          - not_null
      - name: sell_city
        tests:
          - not_null
      - name: sell_state
        tests:
          - not_null
  - name : stg_products
    description: "Tabela de produtos com informações dos produtos"  
    columns:
      - name: prod_id
        tests:
          - unique
          - not_null 
  - name: stg_product_category_name_translate
    description: "Tabela de tradução de categorias de produtos com informações de tradução das categorias"
    columns:
      - name: prod_catg_name_pt
        tests:
          - unique
          - not_null
      - name: prod_catg_name_eng
        tests:
          - not_null